<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Big-Idea Hub — Personal idea tracker with Kanban board, priority management, and AI-powered idea curation">
    <meta name="theme-color" content="#6c5ce7">
    <title>Big-Idea Hub — Track Your Ideas</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- ============================================ -->
    <!-- HEADER                                       -->
    <!-- ============================================ -->
    <header class="header" id="header">
        <div class="header__inner">
            <!-- Logo -->
            <a href="/" class="header__logo">
                <span class="header__logo-icon">💡</span>
                <span class="header__logo-text">Big-Idea</span>
            </a>

            <!-- Center Controls -->
            <div class="header__controls">
                <!-- View Toggle -->
                <div class="view-toggle" id="view-toggle">
                    <button class="view-toggle__btn view-toggle__btn--active" data-view="kanban" aria-label="Kanban View" title="Kanban View">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="5" height="18" rx="1"/>
                            <rect x="10" y="3" width="5" height="12" rx="1"/>
                            <rect x="17" y="3" width="5" height="15" rx="1"/>
                        </svg>
                        <span>Kanban</span>
                    </button>
                    <button class="view-toggle__btn" data-view="list" aria-label="List View" title="List View">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="5" rx="1"/>
                            <rect x="3" y="10" width="18" height="5" rx="1"/>
                            <rect x="3" y="17" width="18" height="5" rx="1"/>
                        </svg>
                        <span>List</span>
                    </button>
                </div>

                <!-- Search Bar -->
                <div class="search-bar">
                    <svg class="search-bar__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <input type="text" id="search-input" class="search-bar__input" placeholder="Search ideas... ( / )" autocomplete="off">
                    <kbd class="search-bar__shortcut">/</kbd>
                </div>
            </div>

            <!-- Right Controls -->
            <div class="header__actions">
                <!-- Action Buttons -->
                <button class="action-btn" id="sync-btn" title="Sync with source">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="23 4 23 10 17 10"/>
                        <polyline points="1 20 1 14 7 14"/>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                    </svg>
                    <span>Sync</span>
                </button>
                <button class="action-btn" id="export-btn" title="Export ideas as JSON">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    <span>Export</span>
                </button>
                <button class="action-btn" id="import-btn" title="Import ideas from JSON">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <span>Import</span>
                </button>
                <input type="file" id="import-file" accept=".json" class="sr-only">

                <!-- Theme Toggle -->
                <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme" title="Toggle theme">
                    <svg class="theme-toggle__sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <svg class="theme-toggle__moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- ============================================ -->
    <!-- FILTER BAR                                   -->
    <!-- ============================================ -->
    <section class="filter-section" id="filter-section">
        <div class="filter-bar" id="filter-bar">
            <!-- Filter chips will be rendered by search.js -->
        </div>
    </section>

    <!-- ============================================ -->
    <!-- MAIN CONTENT                                 -->
    <!-- ============================================ -->
    <main class="main" id="main">
        <div class="app-content" id="app-content">
            <!-- Views rendered here by kanban.js or list.js -->
            <div class="loading">
                <div class="loading__spinner"></div>
                <p class="loading__text">Loading your ideas...</p>
            </div>
        </div>
    </main>

    <!-- ============================================ -->
    <!-- DETAIL MODAL                                 -->
    <!-- ============================================ -->
    <div class="modal" id="detail-modal">
        <div class="modal__overlay"></div>
        <div class="modal__content">
            <!-- Content populated by detail.js -->
        </div>
    </div>

    <!-- ============================================ -->
    <!-- TOAST NOTIFICATIONS                          -->
    <!-- ============================================ -->
    <div class="toast-container" id="toast-container"></div>

    <!-- ============================================ -->
    <!-- FOOTER STATS                                 -->
    <!-- ============================================ -->
    <footer class="footer" id="footer">
        <div class="footer__inner">
            <div class="stat-item">
                <span class="stat-item__icon">📊</span>
                <span class="stat-item__value" id="stats-total">0</span>
                <span class="stat-item__label">Total</span>
            </div>
            <div class="stat-item stat-item--planning">
                <span class="stat-item__dot"></span>
                <span class="stat-item__value" id="stats-planning">0</span>
                <span class="stat-item__label">Planning</span>
            </div>
            <div class="stat-item stat-item--in-process">
                <span class="stat-item__dot"></span>
                <span class="stat-item__value" id="stats-in-process">0</span>
                <span class="stat-item__label">In Process</span>
            </div>
            <div class="stat-item stat-item--complete">
                <span class="stat-item__dot"></span>
                <span class="stat-item__value" id="stats-complete">0</span>
                <span class="stat-item__label">Complete</span>
            </div>
        </div>
    </footer>

    <!-- ============================================ -->
    <!-- SCRIPTS                                      -->
    <!-- ============================================ -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
